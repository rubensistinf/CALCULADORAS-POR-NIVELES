<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel Básico | EduConectRuben</title>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        .app-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
        }

        /* Calculator Hardware Style */
        .calc-hardware {
            max-width: 350px;
            margin: 0 auto;
            background: rgba(10, 25, 47, 0.4);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .calc-display {
            background: rgba(0, 0, 0, 0.5);
            color: var(--clr-accent);
            font-size: 2.5rem;
            text-align: right;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            word-wrap: break-word;
            min-height: 85px;
            font-family: var(--font-mono);
            border: 1px solid rgba(0, 245, 212, 0.2);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn-c {
            padding: 18px 5px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: var(--clr-text-main);
            transition: var(--transition);
            font-family: var(--font-heading);
        }

        .btn-c:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        .btn-c:active { transform: scale(0.95); }
        .btn-c.op { background: rgba(0, 180, 216, 0.2); color: var(--clr-primary); }
        .btn-c.op:hover { background: rgba(0, 180, 216, 0.4); }
        .btn-c.eq { background: var(--clr-primary); color: #fff; }
        .btn-c.eq:hover { background: var(--clr-secondary); }
        .btn-c.ac { background: rgba(239, 35, 60, 0.2); color: var(--clr-danger); }
        .btn-c.ac:hover { background: rgba(239, 35, 60, 0.4); }

        /* Fraction Layout */
        .fraction-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: nowrap;
        }

        .fraction-block {
            display: flex;
            flex-direction: column;
            width: 60px;
        }

        .fraction-block .input-field {
            padding: 8px 4px;
            font-size: 1rem;
            text-align: center;
        }

        .fraction-line {
            height: 3px;
            background-color: var(--clr-primary);
            margin: 5px 0;
            border-radius: 2px;
        }

        .mixed-whole {
            width: 55px !important;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            padding: 8px 4px !important;
        }

        .frac-op-select {
            width: 55px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 6px 4px;
            background-position: right 2px center;
        }

        @media(max-width: 480px) {
            .fraction-row { gap: 6px; }
            .fraction-block { width: 50px; }
            .mixed-whole { width: 45px !important; }
        }
    </style>

    <!-- Open Graph / Redes Sociales -->
    <meta property="og:title" content="Calculadoras Educativas Pro">
    <meta property="og:description" content="Suite profesional de calculadoras multifuncionales para estudiantes e ingenieros. Aritmética, Geometría Analítica, Sistemas, Lógica Proposicional y más.">
    <meta property="og:image" content="https://calculadora-por-niveles.netlify.app/instalar/share-icon.png">
    <meta property="og:url" content="https://calculadora-por-niveles.netlify.app/">
    <meta property="og:type" content="website">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/instalar/manifest.json">
    <meta name="theme-color" content="#00b4d8">


    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/instalar/icon-192.png">

</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand">
            <i class="fa-solid fa-calculator"></i> Nivel 1: Básico
        </div>
        <a href="../index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Volver al Inicio</a>
    </nav>

    <main class="app-container glass-panel">
        <div class="tabs-container">
            <button class="tab-btn active" data-target="tab-std"><i class="fa-solid fa-calculator"></i> Estándar</button>
            <button class="tab-btn" data-target="tab-pct"><i class="fa-solid fa-percent"></i> Porcentajes</button>
            <button class="tab-btn" data-target="tab-frac"><i class="fa-solid fa-shapes"></i> Fracciones</button>
        </div>

        <!-- Estándar -->
        <section id="tab-std" class="tab-content active">
            <div class="calc-hardware">
                <div id="hw-display" class="calc-display">0</div>
                <div class="grid-buttons">
                    <button type="button" class="btn-c ac" onclick="clearStd()">AC</button>
                    <button type="button" class="btn-c op" onclick="appendStd('/')">÷</button>
                    <button type="button" class="btn-c op" onclick="appendStd('*')">×</button>
                    <button type="button" class="btn-c op" onclick="appendStd('-')">−</button>
                    
                    <button type="button" class="btn-c" onclick="appendStd('7')">7</button>
                    <button type="button" class="btn-c" onclick="appendStd('8')">8</button>
                    <button type="button" class="btn-c" onclick="appendStd('9')">9</button>
                    <button type="button" class="btn-c op" onclick="appendStd('+')">+</button>
                    
                    <button type="button" class="btn-c" onclick="appendStd('4')">4</button>
                    <button type="button" class="btn-c" onclick="appendStd('5')">5</button>
                    <button type="button" class="btn-c" onclick="appendStd('6')">6</button>
                    <button type="button" class="btn-c eq" onclick="evalStd()" style="grid-row: span 2; height: 100%;">=</button>
                    
                    <button type="button" class="btn-c" onclick="appendStd('1')">1</button>
                    <button type="button" class="btn-c" onclick="appendStd('2')">2</button>
                    <button type="button" class="btn-c" onclick="appendStd('3')">3</button>
                    
                    <button type="button" class="btn-c" onclick="appendStd('0')" style="grid-column: span 2;">0</button>
                    <button type="button" class="btn-c" onclick="appendStd('.')">.</button>
                </div>
            </div>
        </section>

        <!-- Porcentajes -->
        <section id="tab-pct" class="tab-content">
            <div style="background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--clr-border);">
                <div class="input-group">
                    <label style="color: var(--clr-primary); font-size: 1rem;"><i class="fa-solid fa-magnifying-glass"></i> ¿Qué deseas calcular?</label>
                    <select id="pct-type" class="input-field" style="font-size: 1.1rem; font-weight: bold;">
                        <option value="of">Calcular el X% de Y</option>
                        <option value="is">Qué porcentaje es X de Y</option>
                    </select>
                </div>
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>Valor X:</label>
                    <input type="number" id="pct-x" class="input-field" step="any" placeholder="Ej: 20">
                </div>
                <div class="input-group">
                    <label>Valor Y:</label>
                    <input type="number" id="pct-y" class="input-field" step="any" placeholder="Ej: 150">
                </div>
            </div>
            <button class="btn-primary" onclick="solvePercent()"><i class="fa-solid fa-calculator"></i> Calcular</button>
            <button class="btn-primary" style="background:rgba(255,255,255,0.1); margin-top:10px;" onclick="clearSection('tab-pct', 'pct-result')">Limpiar Datos</button>
            <div id="pct-result"></div>
        </section>

        <!-- Fracciones -->
        <section id="tab-frac" class="tab-content">
            <p style="color: var(--clr-text-muted); text-align: center; margin-bottom: 10px; font-size: 0.9rem;">
                Deja el campo "Entero" vacío si es una fracción simple.
            </p>
            <div class="fraction-row">
                <!-- Fraccion 1 -->
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="number" class="input-field mixed-whole" id="w1" placeholder="Ent" min="0">
                    <div class="fraction-block">
                        <input type="number" class="input-field" id="n1" placeholder="N₁">
                        <div class="fraction-line"></div>
                        <input type="number" class="input-field" id="d1" placeholder="D₁">
                    </div>
                </div>
                
                <!-- Operador -->
                <select id="frac-op" class="input-field frac-op-select">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">×</option>
                    <option value="/">÷</option>
                </select>
                
                <!-- Fraccion 2 -->
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="number" class="input-field mixed-whole" id="w2" placeholder="Ent" min="0">
                    <div class="fraction-block">
                        <input type="number" class="input-field" id="n2" placeholder="N₂">
                        <div class="fraction-line"></div>
                        <input type="number" class="input-field" id="d2" placeholder="D₂">
                    </div>
                </div>
            </div>
            
            <button class="btn-primary" onclick="solveFractions()"><i class="fa-solid fa-bolt"></i> Operar Fracciones</button>
            <button class="btn-primary" style="background:rgba(255,255,255,0.1); margin-top:10px;" onclick="clearSection('tab-frac', 'frac-result')">Limpiar Datos</button>
            <div id="frac-result"></div>
        </section>

    </main>

    <script src="../assets/js/global.js"></script>
    <script>
        // --- Calculadora Estándar ---
        let stdBuffer = "0";

        function appendStd(val) {
            const display = document.getElementById('hw-display');
            if (stdBuffer === "0" && val !== "." && !isNaN(val)) {
                stdBuffer = "";
            }
            stdBuffer += val;
            display.innerText = stdBuffer;
        }

        function clearStd() {
            stdBuffer = "0";
            document.getElementById('hw-display').innerText = stdBuffer;
        }

        function evalStd() {
            const display = document.getElementById('hw-display');
            try {
                // Safely evaluate math
                let safeEval = stdBuffer.replace(/[^-()\d/*+.]/g, '');
                let res = new Function('return ' + safeEval)();
                if (isNaN(res) || !isFinite(res)) throw "Error";
                res = Math.round(res * 100000000) / 100000000; 
                stdBuffer = res.toString();
                display.innerText = stdBuffer;
            } catch (e) {
                display.innerText = "Error";
                stdBuffer = "0";
            }
        }

        // --- Porcentajes ---
        function solvePercent() {
            const type = document.getElementById('pct-type').value;
            const x = parseFloat(document.getElementById('pct-x').value);
            const y = parseFloat(document.getElementById('pct-y').value);

            if (isNaN(x) || isNaN(y)) {
                showResult('pct-result', '<strong>Error:</strong> Completa ambos campos numéricos.', 'error');
                return;
            }

            let html = "";
            if (type === 'of') {
                const calculated = (x / 100) * y;
                html = `El ${x}% de ${y} es: <strong>${Math.round(calculated * 10000) / 10000}</strong>`;
            } else {
                if (y === 0) {
                    showResult('pct-result', '<strong>Error:</strong> No se puede calcular base sobre cero.', 'error');
                    return;
                }
                const calculated = (x / y) * 100;
                html = `${x} equivale al <strong>${Math.round(calculated * 100) / 100}%</strong> de ${y}`;
            }

            showResult('pct-result', html, 'success');
        }

        // --- Fracciones ---
        function solveFractions() {
            const w1 = parseInt(document.getElementById('w1').value) || 0;
            const n1 = parseInt(document.getElementById('n1').value);
            const d1 = parseInt(document.getElementById('d1').value);
            
            const w2 = parseInt(document.getElementById('w2').value) || 0;
            const n2 = parseInt(document.getElementById('n2').value);
            const d2 = parseInt(document.getElementById('d2').value);
            
            const op = document.getElementById('frac-op').value;

            if (isNaN(n1) || isNaN(d1) || isNaN(n2) || isNaN(d2)) {
                showResult('frac-result', '<strong>Error:</strong> Completa los numeradores y denominadores.', 'error');
                return;
            }
            if (d1 === 0 || d2 === 0) {
                showResult('frac-result', '<strong>Error:</strong> El denominador no puede ser cero.', 'error');
                return;
            }

            const num1 = (Math.abs(w1) * d1) + n1;
            const finalNum1 = w1 < 0 ? -num1 : num1;
            
            const num2 = (Math.abs(w2) * d2) + n2;
            const finalNum2 = w2 < 0 ? -num2 : num2;

            let rn = 0, rd = 0;

            if (op === '+') { rn = (finalNum1 * d2) + (finalNum2 * d1); rd = d1 * d2; }
            else if (op === '-') { rn = (finalNum1 * d2) - (finalNum2 * d1); rd = d1 * d2; }
            else if (op === '*') { rn = finalNum1 * finalNum2; rd = d1 * d2; }
            else if (op === '/') { 
                if (finalNum2 === 0) {
                    showResult('frac-result', '<strong>Error:</strong> División por cero.', 'error');
                    return;
                }
                rn = finalNum1 * d2; rd = d1 * finalNum2; 
            }

            // Simplification
            const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
            const div = Math.abs(gcd(rn, rd));
            rn /= div;
            rd /= div;

            // Fix signs
            if (rd < 0) { rn = -rn; rd = -rd; }

            // Mixed fraction calculation
            const finalWhole = Math.floor(Math.abs(rn) / rd) * (rn < 0 ? -1 : 1);
            const remNum = Math.abs(rn) % rd;

            let html = `Fracción Resultante: <strong>${rn} ${rd !== 1 ? '/ ' + rd : ''}</strong>`;
            
            if (Math.abs(rn) > rd && remNum !== 0) {
                html += `<br><br>Equivalente Mixto:<br>
                         <div style="display:inline-flex; align-items:center; gap:5px; margin-top:10px;">
                            <span style="font-size:1.5em; font-weight:bold;">${finalWhole}</span>
                            <div style="display:flex; flex-direction:column; align-items:center; font-weight:bold;">
                                <span>${remNum}</span>
                                <div style="width:20px; height:2px; background:var(--clr-accent);"></div>
                                <span>${rd}</span>
                            </div>
                         </div>`;
            }

            showResult('frac-result', html, 'success');
        }
    </script>

    <!-- PWA Installation Script -->
    <script src="/instalar/pwa.js"></script>

</body>
</html>
