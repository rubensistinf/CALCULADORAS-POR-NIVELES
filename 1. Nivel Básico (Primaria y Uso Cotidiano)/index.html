<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConectRuben | Nivel Básico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* =========================================
           DISEÑO INSTITUCIONAL EDUCONECTRUBEN
           ========================================= */
        :root {
            --clr-navy: #0A192F;
            --clr-blue: #00B4D8;
            --clr-hover: #0096C7;
            --clr-white: #FFFFFF;
            --clr-bg: #F4F7FB;
            --clr-border: #E0E5EC;
            --shadow: 0 10px 30px rgba(10, 25, 47, 0.08);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--clr-bg);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background-color: var(--clr-white);
            width: 100%;
            max-width: 650px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            border-top: 6px solid var(--clr-navy);
        }

        header {
            background-color: var(--clr-navy);
            color: var(--clr-white);
            padding: 20px;
            text-align: center;
        }

        header h1 { color: var(--clr-blue); font-size: 1.6rem; font-family: 'Poppins', sans-serif; }
        header p { font-size: 0.88rem; opacity: 0.85; margin-top: 2px; }

        /* MENÚ DE PESTAÑAS (SPA) */
        .tab-menu {
            display: flex;
            background-color: #FAFCFF;
            border-bottom: 2px solid var(--clr-border);
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--clr-navy);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .tab-btn:hover { background-color: #F0F4F8; color: var(--clr-blue); }
        .tab-btn.active {
            color: var(--clr-blue);
            border-bottom-color: var(--clr-blue);
            background-color: var(--clr-white);
        }

        /* CUERPO DE TRABAJO */
        .workspace-content { padding: 25px; }
        .calc-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .calc-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* INTERFAZ CALCULADORA FÍSICA */
        .calc-hardware { max-width: 320px; margin: 0 auto; }
        .calc-display {
            background-color: var(--clr-navy);
            color: var(--clr-white);
            font-size: 2.2rem;
            text-align: right;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            word-wrap: break-word;
            min-height: 75px;
            font-family: monospace;
        }

        .grid-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-c {
            padding: 15px 5px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background-color: #F0F4F8;
            color: var(--clr-navy);
            transition: 0.15s ease;
        }
        .btn-c:hover { background-color: var(--clr-border); }
        .btn-c.op { background-color: var(--clr-blue); color: white; }
        .btn-c.op:hover { background-color: var(--clr-hover); }
        .btn-c.eq { background-color: var(--clr-navy); color: white; }
        .btn-c.ac { background-color: #EF233C; color: white; }

        /* FORMULARIOS DE PORCENTAJES Y FRACCIONES */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--clr-navy); font-size: 0.88rem; }
        select, input {
            width: 100%; padding: 11px; border: 2px solid var(--clr-border);
            border-radius: 8px; font-size: 0.95rem; background-color: var(--clr-white);
        }
        select:focus, input:focus { outline: none; border-color: var(--clr-blue); }

        .fields-split { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* LAYOUT FRACCIONES MIXTAS */
        .fraction-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 20px 0; }
        .fraction-block { display: flex; flex-direction: column; width: 70px; text-align: center; }
        .fraction-line { height: 2px; background-color: var(--clr-navy); margin: 4px 0; }
        .fraction-block input { text-align: center; padding: 8px; }
        .mixed-whole { width: 65px; text-align: center; font-weight: bold; }

        .btn-action {
            width: 100%; padding: 12px; background-color: var(--clr-blue);
            color: var(--clr-white); border: none; border-radius: 8px;
            font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: 0.25s;
        }
        .btn-action:hover { background-color: var(--clr-hover); }

        .result-box {
            margin-top: 20px; padding: 15px; background-color: #E8F4F8;
            border-left: 5px solid var(--clr-blue); border-radius: 4px;
            font-size: 1rem; color: var(--clr-navy); display: none; line-height: 1.5;
        }
    </style>
</head>
<body>

    <main class="app-container">
        <header>
            <h1>EduConectRuben</h1>
            <p>Módulo Nivel Básico: Herramientas de Cálculo Fundamental</p>
        </header>

        <nav class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('tab-std', this)"><i class="fa-solid fa-calculator"></i> Estándar</button>
            <button class="tab-btn" onclick="switchTab('tab-pct', this)"><i class="fa-solid fa-percent"></i> Porcentajes</button>
            <button class="tab-btn" onclick="switchTab('tab-frac', this)"><i class="fa-solid fa-shapes"></i> Fracciones</button>
        </nav>

        <div class="workspace-content">
            
            <section id="tab-std" class="calc-section active">
                <div class="calc-hardware">
                    <div id="hw-display" class="calc-display">0</div>
                    <div class="grid-buttons">
                        <button type="button" class="btn-c ac" onclick="clearStd()">AC</button>
                        <button type="button" class="btn-c op" onclick="appendStd('/')">÷</button>
                        <button type="button" class="btn-c op" onclick="appendStd('*')">×</button>
                        <button type="button" class="btn-c op" onclick="appendStd('-')">−</button>
                        
                        <button type="button" class="btn-c" onclick="appendStd('7')">7</button>
                        <button type="button" class="btn-c" onclick="appendStd('8')">8</button>
                        <button type="button" class="btn-c" onclick="appendStd('9')">9</button>
                        <button type="button" class="btn-c op" onclick="appendStd('+')">+</button>
                        
                        <button type="button" class="btn-c" onclick="appendStd('4')">4</button>
                        <button type="button" class="btn-c" onclick="appendStd('5')">5</button>
                        <button type="button" class="btn-c" onclick="appendStd('6')">6</button>
                        <button type="button" class="btn-c eq" onclick="evalStd()" style="grid-row: span 2; height: 100%;">=</button>
                        
                        <button type="button" class="btn-c" onclick="appendStd('1')">1</button>
                        <button type="button" class="btn-c" onclick="appendStd('2')">2</button>
                        <button type="button" class="btn-c" onclick="appendStd('3')">3</button>
                        
                        <button type="button" class="btn-c" onclick="appendStd('0')" style="grid-column: span 2;">0</button>
                        <button type="button" class="btn-c" onclick="appendStd('.')">.</button>
                    </div>
                </div>
            </section>

            <section id="tab-pct" class="calc-section">
                <div class="form-group">
                    <label>Tipo de Análisis:</label>
                    <select id="pct-type">
                        <option value="of">Calcular el X% de Y</option>
                        <option value="is">Qué porcentaje es X de Y</option>
                    </select>
                </div>
                <div class="fields-split">
                    <div class="form-group"><label>Valor X:</label><input type="number" id="pct-x" step="any"></div>
                    <div class="form-group"><label>Valor Y:</label><input type="number" id="pct-y" step="any"></div>
                </div>
                <button type="button" class="btn-action" onclick="solvePercent()">Calcular Porcentaje</button>
                <div id="pct-result" class="result-box"></div>
            </section>

            <section id="tab-frac" class="calc-section">
                <div class="fraction-row">
                    <input type="number" class="mixed-whole" id="w1" placeholder="Ent" min="0">
                    <div class="fraction-block">
                        <input type="number" id="n1" placeholder="N₁">
                        <div class="fraction-line"></div>
                        <input type="number" id="d1" placeholder="D₁">
                    </div>
                    
                    <div>
                        <select id="frac-op" style="width: 55px; font-weight: bold;">
                            <option value="+">+</option>
                            <option value="-">-</option>
                            <option value="*">×</option>
                            <option value="/">÷</option>
                        </select>
                    </div>
                    
                    <input type="number" class="mixed-whole" id="w2" placeholder="Ent" min="0">
                    <div class="fraction-block">
                        <input type="number" id="n2" placeholder="N₂">
                        <div class="fraction-line"></div>
                        <input type="number" id="d2" placeholder="D₂">
                    </div>
                </div>
                <button type="button" class="btn-action" onclick="solveFractions()">Operar Fracciones</button>
                <div id="frac-result" class="result-box"></div>
            </section>

        </div>
    </main>

    <script>
        /* ROUTER INTERNO SPA */
        function switchTab(tabId, btn) {
            document.querySelectorAll('.calc-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        /* =========================================
           LÓGICA: CALCULADORA ESTÁNDAR
           ========================================= */
        let stdBuffer = "0";

        function appendStd(val) {
            const display = document.getElementById('hw-display');
            // Corrección Pro: Evitar que arrastre el cero inicial como residuo de cadena
            if (stdBuffer === "0" && val !== "." && !isNaN(val)) {
                stdBuffer = "";
            }
            stdBuffer += val;
            display.innerText = stdBuffer;
        }

        function clearStd() {
            stdBuffer = "0";
            document.getElementById('hw-display').innerText = stdBuffer;
        }

        function evalStd() {
            const display = document.getElementById('hw-display');
            try {
                let res = new Function('return ' + stdBuffer)();
                if (isNaN(res) || !isFinite(res)) throw "Error";
                res = Math.round(res * 1000000) / 1000000; // Redondeo de precisión limpia
                stdBuffer = res.toString();
                display.innerText = stdBuffer;
            } catch (e) {
                display.innerText = "Error";
                stdBuffer = "0";
            }
        }

        /* =========================================
           LÓGICA: CALCULADORA DE PORCENTAJES
           ========================================= */
        function solvePercent() {
            const type = document.getElementById('pct-type').value;
            const x = parseFloat(document.getElementById('pct-x').value);
            const y = parseFloat(document.getElementById('pct-y').value);
            const resBox = document.getElementById('pct-result');

            if (isNaN(x) || isNaN(y)) {
                resBox.innerHTML = "<span style='color:#EF233C;'><strong>Error:</strong> Completa ambos campos numéricos.</span>";
                resBox.style.display = "block";
                return;
            }

            let resultText = "";
            if (type === 'of') {
                const calculated = (x / 100) * y;
                resultText = `El ${x}% de ${y} es: <strong>${Math.round(calculated * 10000) / 10000}</strong>`;
            } else {
                if (y === 0) {
                    resBox.innerHTML = "<span style='color:#EF233C;'><strong>Error:</strong> No se puede calcular base sobre cero.</span>";
                    resBox.style.display = "block";
                    return;
                }
                const calculated = (x / y) * 100;
                resultText = `${x} equivale al <strong>${Math.round(calculated * 100) / 100}%</strong> de ${y}`;
            }

            resBox.innerHTML = resultText;
            resBox.style.display = "block";
        }

        /* =========================================
           LÓGICA: FRACCIONES MIXTAS E IMPROPIAS
           ========================================= */
        function solveFractions() {
            const resBox = document.getElementById('frac-result');
            
            const w1 = parseInt(document.getElementById('w1').value) || 0;
            const n1 = parseInt(document.getElementById('n1').value);
            const d1 = parseInt(document.getElementById('d1').value);
            
            const w2 = parseInt(document.getElementById('w2').value) || 0;
            const n2 = parseInt(document.getElementById('n2').value);
            const d2 = parseInt(document.getElementById('d2').value);
            
            const op = document.getElementById('frac-op').value;

            if (isNaN(n1) || isNaN(d1) || isNaN(n2) || isNaN(d2)) {
                resBox.innerHTML = "<span style='color:#EF233C;'><strong>Error:</strong> Completa los numeradores y denominadores.</span>";
                resBox.style.display = "block";
                return;
            }
            if (d1 === 0 || d2 === 0) {
                resBox.innerHTML = "<span style='color:#EF233C;'><strong>Error:</strong> El denominador no puede ser cero.</span>";
                resBox.style.display = "block";
                return;
            }

            // Conversión matemática a Fracción Impropia
            const num1 = (w1 * d1) + n1;
            const num2 = (w2 * d2) + n2;

            let rn = 0, rd = 0;

            if (op === '+') { rn = (num1 * d2) + (num2 * d1); rd = d1 * d2; }
            else if (op === '-') { rn = (num1 * d2) - (num2 * d1); rd = d1 * d2; }
            else if (op === '*') { rn = num1 * num2; rd = d1 * d2; }
            else if (op === '/') { 
                if (num2 === 0) {
                    resBox.innerHTML = "<span style='color:#EF233C;'><strong>Error:</strong> División por cero.</span>";
                    resBox.style.display = "block";
                    return;
                }
                rn = num1 * d2; rd = d1 * num2; 
            }

            // Algoritmo MCD para Máxima Simplificación
            const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
            const div = Math.abs(gcd(rn, rd));
            rn /= div;
            rd /= div;

            // Re-conversión a formato mixto estético
            const finalWhole = Math.floor(Math.abs(rn) / rd) * Math.sign(rn);
            const finalNum = Math.abs(rn) % rd;

            if (finalWhole !== 0 && finalNum !== 0) {
                resBox.innerHTML = `Fracción Impropia: <strong>${rn} / ${rd}</strong> <br> Equivalente Mixto: <strong>${finalWhole} Ent [ ${finalNum} / ${rd} ]</strong>`;
            } else {
                resBox.innerHTML = `Fracción Simplificada: <strong>${rn} ${rd !== 1 ? '/ ' + rd : ''}</strong>`;
            }
            resBox.style.display = "block";
        }
    </script>
</body>
</html>
