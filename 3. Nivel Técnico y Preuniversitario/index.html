<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel Técnico | EduConectRuben</title>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        .app-container { max-width: 900px; margin: 40px auto; padding: 30px; }
        
        /* Matriz Grid Layout */
        .matrix-grid { display: grid; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .grid-2x2 { grid-template-columns: repeat(2, 60px); }
        .grid-3x3 { grid-template-columns: repeat(3, 60px); }
        .grid-3x4 { grid-template-columns: repeat(4, 60px); }
        
        .matrix-cell {
            width: 100%; padding: 10px; text-align: center;
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--clr-border);
            border-radius: 6px; color: var(--clr-text-main); font-family: var(--font-mono);
        }
        .matrix-cell:focus { outline: none; border-color: var(--clr-primary); }

        .matrix-wrapper {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin-bottom: 20px; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 12px;
        }

        .matrix-bracket { font-size: 6rem; font-weight: 300; color: var(--clr-primary); user-select: none; }
        .matrix-operator { font-size: 2rem; color: var(--clr-accent); }

        .helper-text { font-size: 0.9rem; color: var(--clr-text-muted); text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand"><i class="fa-solid fa-chart-pie"></i> Nivel 3: Técnico y Preuniversitario</div>
        <a href="../index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Volver</a>
    </nav>

    <main class="app-container glass-panel">
        <div class="tabs-container">
            <button class="tab-btn active" data-target="tab-cramer">Regla de Cramer (3x3)</button>
            <button class="tab-btn" data-target="tab-mat">Operaciones Matrices (2x2)</button>
            <button class="tab-btn" data-target="tab-stat">Estadística Descriptiva</button>
        </div>

        <!-- Cramer 3x3 -->
        <section id="tab-cramer" class="tab-content active">
            <p class="helper-text">Sistema de Ecuaciones Lineales 3x3: <br>a₁x + b₁y + c₁z = d₁ <br>a₂x + b₂y + c₂z = d₂ <br>a₃x + b₃y + c₃z = d₃</p>
            <div class="matrix-wrapper">
                <span class="matrix-bracket">[</span>
                <div class="matrix-grid grid-3x4" id="cramer-grid">
                    <!-- Fila 1 -->
                    <input type="number" id="c-a1" class="matrix-cell" placeholder="a₁">
                    <input type="number" id="c-b1" class="matrix-cell" placeholder="b₁">
                    <input type="number" id="c-c1" class="matrix-cell" placeholder="c₁">
                    <input type="number" id="c-d1" class="matrix-cell" placeholder="d₁" style="border-left:2px solid var(--clr-warning);">
                    <!-- Fila 2 -->
                    <input type="number" id="c-a2" class="matrix-cell" placeholder="a₂">
                    <input type="number" id="c-b2" class="matrix-cell" placeholder="b₂">
                    <input type="number" id="c-c2" class="matrix-cell" placeholder="c₂">
                    <input type="number" id="c-d2" class="matrix-cell" placeholder="d₂" style="border-left:2px solid var(--clr-warning);">
                    <!-- Fila 3 -->
                    <input type="number" id="c-a3" class="matrix-cell" placeholder="a₃">
                    <input type="number" id="c-b3" class="matrix-cell" placeholder="b₃">
                    <input type="number" id="c-c3" class="matrix-cell" placeholder="c₃">
                    <input type="number" id="c-d3" class="matrix-cell" placeholder="d₃" style="border-left:2px solid var(--clr-warning);">
                </div>
                <span class="matrix-bracket">]</span>
            </div>
            <button class="btn-primary" onclick="solveCramer()"><i class="fa-solid fa-bolt"></i> Resolver por Cramer</button>
            <button class="btn-primary" style="background:rgba(255,255,255,0.1); margin-top:10px;" onclick="clearInputs('cramer-grid')">Limpiar</button>
            <div id="cramer-result"></div>
        </section>

        <!-- Operaciones Matrices 2x2 -->
        <section id="tab-mat" class="tab-content">
            <p class="helper-text">Operaciones elementales entre dos matrices 2x2</p>
            <div class="matrix-wrapper">
                <div style="text-align:center;">
                    <div style="color:var(--clr-primary); margin-bottom:5px;">Matriz A</div>
                    <div class="matrix-grid grid-2x2" id="matA-grid">
                        <input type="number" id="ma-00" class="matrix-cell"> <input type="number" id="ma-01" class="matrix-cell">
                        <input type="number" id="ma-10" class="matrix-cell"> <input type="number" id="ma-11" class="matrix-cell">
                    </div>
                </div>
                
                <select id="mat-op" class="input-field" style="width:70px; text-align:center; font-weight:bold; font-size:1.5rem; padding:5px; background-position: right 0px center;">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">×</option>
                </select>

                <div style="text-align:center;">
                    <div style="color:var(--clr-primary); margin-bottom:5px;">Matriz B</div>
                    <div class="matrix-grid grid-2x2" id="matB-grid">
                        <input type="number" id="mb-00" class="matrix-cell"> <input type="number" id="mb-01" class="matrix-cell">
                        <input type="number" id="mb-10" class="matrix-cell"> <input type="number" id="mb-11" class="matrix-cell">
                    </div>
                </div>
            </div>
            
            <div style="display:flex; gap:10px;">
                <button class="btn-primary" onclick="calcMatrixOp()"><i class="fa-solid fa-bolt"></i> Operar (A y B)</button>
                <button class="btn-primary" style="background:var(--clr-warning); color:#000;" onclick="calcDet('A')">Det(A)</button>
                <button class="btn-primary" style="background:var(--clr-warning); color:#000;" onclick="calcDet('B')">Det(B)</button>
            </div>
            <button class="btn-primary" style="background:rgba(255,255,255,0.1); margin-top:10px;" onclick="clearInputs('matA-grid'); clearInputs('matB-grid');">Limpiar</button>
            
            <div id="mat-result"></div>
        </section>

        <!-- Estadística -->
        <section id="tab-stat" class="tab-content">
            <p class="helper-text">Calculadora Estadística Multifuncional</p>
            <div class="input-group">
                <label>Ingresa el conjunto de datos (separados por comas):</label>
                <input type="text" id="stat-data" class="input-field" placeholder="Ej: 12.5, 45, 8, 3, 45, 12.5">
            </div>
            <button class="btn-primary" onclick="solveStats()"><i class="fa-solid fa-bolt"></i> Analizar Datos</button>
            <div id="stat-result"></div>
        </section>

    </main>

    <script src="../assets/js/global.js"></script>
    <script>
        function getVal(id) { const val = document.getElementById(id).value; return val === "" ? 0 : parseFloat(val); }
        function clearInputs(containerId) {
            const container = document.getElementById(containerId);
            if(container) container.querySelectorAll('input').forEach(i => i.value = '');
            document.querySelectorAll('.result-box').forEach(r => r.style.display = 'none');
        }

        // --- CRAMER 3x3 ---
        function det3x3(m) {
            return m[0][0]*(m[1][1]*m[2][2] - m[1][2]*m[2][1]) 
                 - m[0][1]*(m[1][0]*m[2][2] - m[1][2]*m[2][0]) 
                 + m[0][2]*(m[1][0]*m[2][1] - m[1][1]*m[2][0]);
        }

        function solveCramer() {
            const m = [
                [getVal('c-a1'), getVal('c-b1'), getVal('c-c1'), getVal('c-d1')],
                [getVal('c-a2'), getVal('c-b2'), getVal('c-c2'), getVal('c-d2')],
                [getVal('c-a3'), getVal('c-b3'), getVal('c-c3'), getVal('c-d3')]
            ];

            const D = det3x3([[m[0][0], m[0][1], m[0][2]], [m[1][0], m[1][1], m[1][2]], [m[2][0], m[2][1], m[2][2]]]);
            
            if (D === 0) {
                showResult('cramer-result', '<strong>El determinante principal es 0.</strong> El sistema no tiene solución única (es inconsistente o dependiente).', 'error');
                return;
            }

            const Dx = det3x3([[m[0][3], m[0][1], m[0][2]], [m[1][3], m[1][1], m[1][2]], [m[2][3], m[2][1], m[2][2]]]);
            const Dy = det3x3([[m[0][0], m[0][3], m[0][2]], [m[1][0], m[1][3], m[1][2]], [m[2][0], m[2][3], m[2][2]]]);
            const Dz = det3x3([[m[0][0], m[0][1], m[0][3]], [m[1][0], m[1][1], m[1][3]], [m[2][0], m[2][1], m[2][3]]]);

            const x = Dx / D; const y = Dy / D; const z = Dz / D;

            let html = `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div>Δ = ${D.toFixed(4)}<br>Δx = ${Dx.toFixed(4)}<br>Δy = ${Dy.toFixed(4)}<br>Δz = ${Dz.toFixed(4)}</div>
                <div style="font-size:1.2rem; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;">
                    <strong>x = ${x.toFixed(4)}</strong><br>
                    <strong>y = ${y.toFixed(4)}</strong><br>
                    <strong>z = ${z.toFixed(4)}</strong>
                </div>
            </div>`;
            showResult('cramer-result', html, 'success');
        }

        // --- MATRICES 2x2 ---
        function getMat(prefix) {
            return [
                [getVal(`${prefix}-00`), getVal(`${prefix}-01`)],
                [getVal(`${prefix}-10`), getVal(`${prefix}-11`)]
            ];
        }

        function formatMat(m) {
            return `<div class="matrix-wrapper" style="margin:0; padding:10px; background:transparent;">
                <span class="matrix-bracket" style="font-size:3rem;">[</span>
                <div class="matrix-grid grid-2x2" style="margin:0;">
                    <div class="matrix-cell">${m[0][0].toFixed(2)}</div> <div class="matrix-cell">${m[0][1].toFixed(2)}</div>
                    <div class="matrix-cell">${m[1][0].toFixed(2)}</div> <div class="matrix-cell">${m[1][1].toFixed(2)}</div>
                </div>
                <span class="matrix-bracket" style="font-size:3rem;">]</span>
            </div>`;
        }

        function calcMatrixOp() {
            const a = getMat('ma'); const b = getMat('mb');
            const op = document.getElementById('mat-op').value;
            let res = [[0,0],[0,0]];

            if (op === '+') {
                res[0][0] = a[0][0]+b[0][0]; res[0][1] = a[0][1]+b[0][1];
                res[1][0] = a[1][0]+b[1][0]; res[1][1] = a[1][1]+b[1][1];
            } else if (op === '-') {
                res[0][0] = a[0][0]-b[0][0]; res[0][1] = a[0][1]-b[0][1];
                res[1][0] = a[1][0]-b[1][0]; res[1][1] = a[1][1]-b[1][1];
            } else if (op === '*') {
                res[0][0] = a[0][0]*b[0][0] + a[0][1]*b[1][0];
                res[0][1] = a[0][0]*b[0][1] + a[0][1]*b[1][1];
                res[1][0] = a[1][0]*b[0][0] + a[1][1]*b[1][0];
                res[1][1] = a[1][0]*b[0][1] + a[1][1]*b[1][1];
            }
            showResult('mat-result', `<strong>Resultado:</strong><br>${formatMat(res)}`, 'success');
        }

        function calcDet(matName) {
            const m = getMat(matName === 'A' ? 'ma' : 'mb');
            const det = m[0][0]*m[1][1] - m[0][1]*m[1][0];
            showResult('mat-result', `Determinante de Matriz ${matName}: <strong>${det.toFixed(4)}</strong>`, 'success');
        }

        // --- ESTADÍSTICA MULTIFUNCIONAL ---
        function solveStats() {
            const raw = document.getElementById('stat-data').value;
            if(!raw.trim()) { showResult('stat-result', 'Error: Ingresa datos.', 'error'); return; }
            
            const arr = raw.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
            if(arr.length === 0) { showResult('stat-result', 'Error: No se encontraron números válidos.', 'error'); return; }

            arr.sort((a,b) => a - b);
            const n = arr.length;
            
            // Media
            const sum = arr.reduce((a,b)=>a+b, 0);
            const mean = sum / n;
            
            // Mediana
            let median;
            if(n % 2 === 0) median = (arr[n/2 - 1] + arr[n/2]) / 2;
            else median = arr[Math.floor(n/2)];
            
            // Moda
            const counts = {};
            let maxCount = 0;
            arr.forEach(val => { counts[val] = (counts[val]||0)+1; if(counts[val]>maxCount) maxCount=counts[val]; });
            const modes = Object.keys(counts).filter(k => counts[k] === maxCount);
            const modeText = modes.length === arr.length ? "No hay (todos únicos)" : modes.join(', ');

            // Varianza & Desviación Estándar (Muestral)
            const sumSq = arr.reduce((acc, val) => acc + Math.pow(val - mean, 2), 0);
            const variance = n > 1 ? sumSq / (n - 1) : 0;
            const stdDev = Math.sqrt(variance);

            const html = `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><strong>N° de Datos (n):</strong> ${n}</div>
                <div><strong>Suma (Σx):</strong> ${sum.toFixed(2)}</div>
                <div><strong>Media (x̄):</strong> ${mean.toFixed(4)}</div>
                <div><strong>Mediana:</strong> ${median.toFixed(4)}</div>
                <div><strong>Moda:</strong> ${modeText}</div>
                <div><strong>Rango:</strong> ${(arr[n-1] - arr[0]).toFixed(4)}</div>
                <div><strong>Varianza (s²):</strong> ${variance.toFixed(4)}</div>
                <div><strong>Desviación Est. (s):</strong> ${stdDev.toFixed(4)}</div>
            </div>`;
            showResult('stat-result', html, 'success');
        }
    </script>
</body>
</html>
