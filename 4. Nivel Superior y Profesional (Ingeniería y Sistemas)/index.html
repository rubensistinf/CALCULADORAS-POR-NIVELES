<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nivel Superior | EduConectRuben</title>
    
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        .app-container { max-width: 900px; margin: 40px auto; padding: 30px; }
        
        /* Programmer Calc Layout */
        .prog-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        
        .prog-bases { display: flex; flex-direction: column; gap: 10px; }
        .base-row { 
            display: flex; align-items: center; background: rgba(0,0,0,0.3);
            padding: 10px 15px; border-radius: 8px; border: 1px solid var(--clr-border);
            cursor: pointer; transition: var(--transition);
        }
        .base-row:hover { background: rgba(255,255,255,0.05); }
        .base-row.active { border-color: var(--clr-primary); background: rgba(0, 180, 216, 0.1); }
        .base-label { width: 45px; font-weight: bold; color: var(--clr-primary); font-size: 0.85rem; }
        .base-val { flex: 1; font-family: var(--font-mono); text-align: right; letter-spacing: 1px; word-break: break-all;}
        
        .prog-keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-c {
            padding: 12px 5px; font-size: 1rem; font-weight: bold; border: none;
            border-radius: 6px; cursor: pointer; background: rgba(255, 255, 255, 0.1);
            color: var(--clr-text-main); transition: var(--transition); font-family: var(--font-mono);
        }
        .btn-c:hover { background: rgba(255, 255, 255, 0.2); }
        .btn-c:active { transform: scale(0.95); }
        .btn-c:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-c.op { background: rgba(0, 180, 216, 0.2); color: var(--clr-primary); }
        .btn-c.ac { background: rgba(239, 35, 60, 0.2); color: var(--clr-danger); }
        .btn-c.eq { background: var(--clr-primary); color: white; }
        .btn-c.bit { background: rgba(0, 245, 212, 0.1); color: var(--clr-accent); font-size: 0.8rem; }
        
        .bits-display {
            grid-column: 1 / -1; display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin-bottom: 10px;
        }
        .bit-block { text-align: center; font-size: 0.75rem; color: var(--clr-text-muted); font-family: var(--font-mono); }
        .bit-val { font-size: 1rem; font-weight: bold; color: var(--clr-accent); margin-top: 2px; }

        @media(max-width: 768px) { .prog-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-brand"><i class="fa-solid fa-laptop-code"></i> Nivel 4: Ingeniería y Sistemas</div>
        <a href="../index.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Volver</a>
    </nav>

    <main class="app-container glass-panel">
        <div class="tabs-container">
            <button class="tab-btn active" data-target="tab-prog">Calculadora Programador</button>
            <button class="tab-btn" data-target="tab-info">Conversión de Unidades</button>
        </div>

        <!-- Programador -->
        <section id="tab-prog" class="tab-content active">
            <div class="prog-grid">
                
                <!-- Display y Bases -->
                <div class="prog-bases">
                    <div class="base-row" onclick="setBase(16)" id="row-hex">
                        <span class="base-label">HEX</span><span class="base-val" id="val-hex">0</span>
                    </div>
                    <div class="base-row active" onclick="setBase(10)" id="row-dec">
                        <span class="base-label">DEC</span><span class="base-val" id="val-dec">0</span>
                    </div>
                    <div class="base-row" onclick="setBase(8)" id="row-oct">
                        <span class="base-label">OCT</span><span class="base-val" id="val-oct">0</span>
                    </div>
                    <div class="base-row" onclick="setBase(2)" id="row-bin">
                        <span class="base-label">BIN</span><span class="base-val" id="val-bin">0</span>
                    </div>

                    <!-- Representación de Bits (64-bit visual approximation: 32 bits shown) -->
                    <div style="margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 8px;">
                        <div style="font-size: 0.75rem; color: var(--clr-text-muted); margin-bottom: 10px;">Visualización Binaria (32 bits LSB)</div>
                        <div class="bits-display" id="bits-container">
                            <!-- JS will populate 8 blocks of 4 bits -->
                        </div>
                    </div>
                </div>

                <!-- Teclado -->
                <div class="prog-keypad">
                    <!-- Fila 1: Bitwise -->
                    <button class="btn-c bit" onclick="setOp('&')">AND</button>
                    <button class="btn-c bit" onclick="setOp('|')">OR</button>
                    <button class="btn-c bit" onclick="setOp('^')">XOR</button>
                    <button class="btn-c bit" onclick="calcNot()">NOT</button>

                    <!-- Fila 2: Letras HEX -->
                    <button class="btn-c hex-key" onclick="append('A')" disabled>A</button>
                    <button class="btn-c hex-key" onclick="append('B')" disabled>B</button>
                    <button class="btn-c bit" onclick="setOp('<<')">LSH</button>
                    <button class="btn-c bit" onclick="setOp('>>')">RSH</button>
                    
                    <!-- Fila 3 -->
                    <button class="btn-c hex-key" onclick="append('C')" disabled>C</button>
                    <button class="btn-c hex-key" onclick="append('D')" disabled>D</button>
                    <button class="btn-c ac" onclick="clearProg()">AC</button>
                    <button class="btn-c op" onclick="setOp('/')">÷</button>
                    
                    <!-- Fila 4 -->
                    <button class="btn-c hex-key" onclick="append('E')" disabled>E</button>
                    <button class="btn-c hex-key" onclick="append('F')" disabled>F</button>
                    <button class="btn-c" onclick="append('7')" id="k7">7</button>
                    <button class="btn-c" onclick="append('8')" id="k8">8</button>
                    
                    <!-- Fila 5 -->
                    <button class="btn-c op" onclick="setOp('*')">×</button>
                    <button class="btn-c" onclick="append('9')" id="k9">9</button>
                    <button class="btn-c" onclick="append('4')" id="k4">4</button>
                    <button class="btn-c" onclick="append('5')" id="k5">5</button>
                    
                    <!-- Fila 6 -->
                    <button class="btn-c op" onclick="setOp('-')">−</button>
                    <button class="btn-c" onclick="append('6')" id="k6">6</button>
                    <button class="btn-c" onclick="append('1')" id="k1">1</button>
                    <button class="btn-c" onclick="append('2')" id="k2">2</button>
                    
                    <!-- Fila 7 -->
                    <button class="btn-c op" onclick="setOp('+')">+</button>
                    <button class="btn-c" onclick="append('3')" id="k3">3</button>
                    <button class="btn-c" onclick="append('0')" id="k0">0</button>
                    <button class="btn-c eq" onclick="calcEq()">=</button>
                </div>
            </div>
        </section>

        <!-- Conversión Informática -->
        <section id="tab-info" class="tab-content">
            <p class="helper-text">Conversión de unidades de almacenamiento de datos</p>
            <div class="grid-2">
                <div class="input-group">
                    <label>Valor a Convertir:</label>
                    <input type="number" id="info-val" class="input-field" value="1">
                </div>
                <div class="input-group">
                    <label>Unidad de Origen:</label>
                    <select id="info-from" class="input-field">
                        <option value="1">Bytes (B)</option>
                        <option value="1024">Kilobytes (KB)</option>
                        <option value="1048576" selected>Megabytes (MB)</option>
                        <option value="1073741824">Gigabytes (GB)</option>
                        <option value="1099511627776">Terabytes (TB)</option>
                    </select>
                </div>
            </div>
            <button class="btn-primary" onclick="solveInfo()"><i class="fa-solid fa-bolt"></i> Convertir a Todas las Unidades</button>
            <div id="info-result"></div>
        </section>

    </main>

    <script src="../assets/js/global.js"></script>
    <script>
        // --- PROGRAMMER CALCULATOR ---
        let currentBase = 10;
        let currentValue = 0n; // Use BigInt to prevent overflow in bitwise ops
        let pendingOp = null;
        let pendingValue = null;
        let isNewInput = true;

        function renderBits() {
            const container = document.getElementById('bits-container');
            container.innerHTML = '';
            
            // Get 32-bit representation
            const masked = BigInt.asIntN(32, currentValue);
            let binStr = (masked < 0n ? (~-masked).toString(2) : masked.toString(2)).padStart(32, '0');
            if(binStr.length > 32) binStr = binStr.substring(binStr.length - 32);

            for(let i=0; i<8; i++) {
                const chunk = binStr.substring(i*4, i*4+4);
                container.innerHTML += `<div class="bit-block">${31 - i*4}<div class="bit-val">${chunk}</div></div>`;
            }
        }

        function updateDisplays() {
            document.getElementById('val-hex').innerText = currentValue.toString(16).toUpperCase();
            document.getElementById('val-dec').innerText = currentValue.toString(10);
            document.getElementById('val-oct').innerText = currentValue.toString(8);
            document.getElementById('val-bin').innerText = currentValue.toString(2);
            renderBits();
        }

        function setBase(base) {
            currentBase = base;
            document.querySelectorAll('.base-row').forEach(r => r.classList.remove('active'));
            if(base===16) document.getElementById('row-hex').classList.add('active');
            if(base===10) document.getElementById('row-dec').classList.add('active');
            if(base===8) document.getElementById('row-oct').classList.add('active');
            if(base===2) document.getElementById('row-bin').classList.add('active');

            // Update keys based on base
            document.querySelectorAll('.hex-key').forEach(k => k.disabled = base !== 16);
            document.getElementById('k9').disabled = base < 10;
            document.getElementById('k8').disabled = base < 10;
            document.getElementById('k7').disabled = base < 8;
            document.getElementById('k6').disabled = base < 8;
            document.getElementById('k5').disabled = base < 8;
            document.getElementById('k4').disabled = base < 8;
            document.getElementById('k3').disabled = base < 8;
            document.getElementById('k2').disabled = base < 8;
        }

        function append(char) {
            if (isNewInput) {
                currentValue = BigInt(parseInt(char, currentBase));
                isNewInput = false;
            } else {
                const str = currentValue.toString(currentBase) + char;
                try { currentValue = BigInt("0x" + parseInt(str, currentBase).toString(16)); }
                catch(e){} // ignore overflow/parse err temporarily
            }
            updateDisplays();
        }

        function setOp(op) {
            if (pendingOp !== null && !isNewInput) calcEq();
            pendingOp = op;
            pendingValue = currentValue;
            isNewInput = true;
        }

        function calcEq() {
            if (pendingOp === null || pendingValue === null) return;
            let res = 0n;
            if(pendingOp === '+') res = pendingValue + currentValue;
            if(pendingOp === '-') res = pendingValue - currentValue;
            if(pendingOp === '*') res = pendingValue * currentValue;
            if(pendingOp === '/') res = currentValue !== 0n ? pendingValue / currentValue : 0n;
            
            // Bitwise (limit to 32 bits for typical programmer calc feel)
            let a32 = BigInt.asIntN(32, pendingValue);
            let b32 = BigInt.asIntN(32, currentValue);
            
            if(pendingOp === '&') res = a32 & b32;
            if(pendingOp === '|') res = a32 | b32;
            if(pendingOp === '^') res = a32 ^ b32;
            if(pendingOp === '<<') res = a32 << b32;
            if(pendingOp === '>>') res = a32 >> b32;

            currentValue = res;
            pendingOp = null;
            isNewInput = true;
            updateDisplays();
        }

        function calcNot() {
            currentValue = ~BigInt.asIntN(32, currentValue);
            isNewInput = true;
            updateDisplays();
        }

        function clearProg() {
            currentValue = 0n; pendingOp = null; pendingValue = null; isNewInput = true;
            updateDisplays();
        }

        // Initialize
        setBase(10);
        updateDisplays();

        // --- CONVERSIÓN DE UNIDADES ---
        function solveInfo() {
            const val = parseFloat(document.getElementById('info-val').value);
            const mult = parseFloat(document.getElementById('info-from').value);
            if (isNaN(val)) { showResult('info-result', 'Error: Ingresa un valor numérico.', 'error'); return; }

            const bytes = val * mult;
            const html = `
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><strong>Bytes (B):</strong> ${bytes}</div>
                    <div><strong>Kilobytes (KB):</strong> ${(bytes / 1024).toFixed(4)}</div>
                    <div><strong>Megabytes (MB):</strong> ${(bytes / 1048576).toFixed(4)}</div>
                    <div><strong>Gigabytes (GB):</strong> ${(bytes / 1073741824).toFixed(4)}</div>
                    <div><strong>Terabytes (TB):</strong> ${(bytes / 1099511627776).toFixed(6)}</div>
                </div>
            `;
            showResult('info-result', html, 'success');
        }
    </script>
</body>
</html>
