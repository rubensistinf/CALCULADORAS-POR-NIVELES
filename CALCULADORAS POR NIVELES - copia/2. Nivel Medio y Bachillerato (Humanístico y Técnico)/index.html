<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConectRuben | Nivel Medio y Bachillerato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* =========================================
           DISEÑO INSTITUCIONAL EDUCONECTRUBEN
           ========================================= */
        :root {
            --clr-navy: #0A192F;
            --clr-blue: #00B4D8;
            --clr-hover: #0096C7;
            --clr-white: #FFFFFF;
            --clr-bg: #F4F7FB;
            --clr-border: #E0E5EC;
            --shadow: 0 10px 30px rgba(10, 25, 47, 0.08);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--clr-bg); color: #333;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .app-container {
            background-color: var(--clr-white); width: 100%; max-width: 720px;
            border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
            border-top: 6px solid var(--clr-navy);
        }

        header {
            background-color: var(--clr-navy); color: var(--clr-white);
            padding: 20px; text-align: center;
        }
        header h1 { color: var(--clr-blue); font-size: 1.6rem; font-family: 'Poppins', sans-serif; }
        header p { font-size: 0.88rem; opacity: 0.85; margin-top: 2px; }

        /* NAVBAR SPA */
        .tab-menu { display: flex; background-color: #FAFCFF; border-bottom: 2px solid var(--clr-border); overflow-x: auto; }
        .tab-btn {
            flex: 1; padding: 14px 10px; background: none; border: none; min-width: 100px;
            border-bottom: 3px solid transparent; font-size: 0.9rem; font-weight: 600;
            color: var(--clr-navy); cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
        }
        .tab-btn:hover { background-color: #F0F4F8; color: var(--clr-blue); }
        .tab-btn.active { color: var(--clr-blue); border-bottom-color: var(--clr-blue); background-color: var(--clr-white); }

        /* CUERPO CENTRAL */
        .workspace-content { padding: 25px; }
        .calc-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .calc-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* HARDWARE CASIO CIENTÍFICA */
        .calc-hardware { max-width: 380px; margin: 0 auto; }
        .calc-display {
            background-color: var(--clr-navy); color: var(--clr-white);
            font-size: 2.1rem; text-align: right; padding: 16px;
            border-radius: 8px; margin-bottom: 12px; word-wrap: break-word; min-height: 80px;
            font-family: monospace; position: relative;
        }
        .shift-indicator { position: absolute; top: 5px; left: 10px; font-size: 0.75rem; color: #FFB703; font-weight: bold; display: none; }
        .grid-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        
        .btn-c {
            padding: 15px 5px; font-size: 1rem; font-weight: bold; border: none;
            border-radius: 6px; cursor: pointer; background-color: #F0F4F8; color: var(--clr-navy);
            position: relative; transition: 0.15s ease;
        }
        .btn-c:hover { background-color: var(--clr-border); }
        .btn-c.op { background-color: var(--clr-blue); color: white; }
        .btn-c.fn { background-color: #E1E8F0; font-size: 0.85rem; padding: 18px 5px 10px 5px; }
        .btn-c.eq { background-color: var(--clr-navy); color: white; }
        .btn-c.ac { background-color: #EF233C; color: white; }
        .btn-c.shift-key { background-color: #FFB703; color: var(--clr-navy); padding: 15px 5px; }
        .btn-c.shift-key.active { background-color: #FB8500; color: white; }
        .shift-label { position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; color: #FB8500; font-weight: bold; pointer-events: none; }

        .trig-modes { display: flex; gap: 6px; margin-bottom: 8px; justify-content: center; }
        .trig-modes span { font-size: 0.75rem; font-weight: bold; padding: 4px 10px; border-radius: 4px; cursor: pointer; background: #E0E5EC; color: #666; }
        .trig-modes span.active { background: var(--clr-blue); color: white; }

        /* FORMULARIOS COMUNES */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--clr-navy); font-size: 0.88rem; }
        select, input { width: 100%; padding: 11px; border: 2px solid var(--clr-border); border-radius: 8px; font-size: 0.95rem; }
        select:focus, input:focus { outline: none; border-color: var(--clr-blue); }
        .fields-split { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-action { width: 100%; padding: 12px; background-color: var(--clr-blue); color: var(--clr-white); border: none; border-radius: 8px; font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: 0.25s; }
        .btn-action:hover { background-color: var(--clr-hover); }
        .result-box { margin-top: 20px; padding: 15px; background-color: #E8F4F8; border-left: 5px solid var(--clr-blue); border-radius: 4px; font-size: 1rem; color: var(--clr-navy); display: none; line-height: 1.5; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <main class="app-container">
        <header>
            <h1>EduConectRuben</h1>
            <p>Módulo Nivel Medio: Álgebra, Series y Trigonometría</p>
        </header>

        <nav class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('tab-sci', this)">Científica</button>
            <button class="tab-btn" onclick="switchTab('tab-ari', this)">P. Aritmética</button>
            <button class="tab-btn" onclick="switchTab('tab-geo', this)">P. Geométrica</button>
            <button class="tab-btn" onclick="switchTab('tab-quad', this)">2do Grado</button>
            <button class="tab-btn" onclick="switchTab('tab-pyt', this)">Pitágoras</button>
        </nav>

        <div class="workspace-content">
            
            <section id="tab-sci" class="calc-section active">
                <div class="calc-hardware">
                    <div class="trig-modes"><span id="mDeg" class="active" onclick="setTrig('DEG')">DEG</span><span id="mRad" onclick="setTrig('RAD')">RAD</span></div>
                    <div id="hw-display" class="calc-display"><span id="shift-ind" class="shift-indicator">SHIFT</span>0</div>
                    <div class="grid-buttons">
                        <button type="button" id="btn-shift" class="btn-c shift-key" onclick="toggleShift()">SHIFT</button>
                        <button type="button" class="btn-c fn" onclick="triggerTrig('sin')"><span class="shift-label">asin</span>sin</button>
                        <button type="button" class="btn-c fn" onclick="triggerTrig('cos')"><span class="shift-label">acos</span>cos</button>
                        <button type="button" class="btn-c fn" onclick="triggerTrig('tan')"><span class="shift-label">atan</span>tan</button>
                        <button type="button" class="btn-c fn" onclick="appendSci('√(')"><span class="shift-label">x²</span>√</button>
                        
                        <button type="button" class="btn-c fn" onclick="appendSci('log(')">log</button>
                        <button type="button" class="btn-c fn" onclick="appendSci('(')">(</button>
                        <button type="button" class="btn-c fn" onclick="appendSci(')')">)</button>
                        <button type="button" class="btn-c fn" onclick="appendSci('^')">xʸ</button>
                        <button type="button" class="btn-c fn" onclick="appendSci('π')">π</button>

                        <button type="button" class="btn-c" onclick="appendSci('7')">7</button>
                        <button type="button" class="btn-c" onclick="appendSci('8')">8</button>
                        <button type="button" class="btn-c" onclick="appendSci('9')">9</button>
                        <button type="button" class="btn-c ac" onclick="clearSci()" style="grid-column: span 2;">AC</button>
                        
                        <button type="button" class="btn-c" onclick="appendSci('4')">4</button>
                        <button type="button" class="btn-c" onclick="appendSci('5')">5</button>
                        <button type="button" class="btn-c" onclick="appendSci('6')">6</button>
                        <button type="button" class="btn-c op" onclick="appendSci('*')">×</button>
                        <button type="button" class="btn-c op" onclick="appendSci('/')">÷</button>
                        
                        <button type="button" class="btn-c" onclick="appendSci('1')">1</button>
                        <button type="button" class="btn-c" onclick="appendSci('2')">2</button>
                        <button type="button" class="btn-c" onclick="appendSci('3')">3</button>
                        <button type="button" class="btn-c op" onclick="appendSci('+')">+</button>
                        <button type="button" class="btn-c op" onclick="appendSci('-')">−</button>
                        
                        <button type="button" class="btn-c" onclick="appendSci('0')" style="grid-column: span 2;">0</button>
                        <button type="button" class="btn-c" onclick="appendSci('.')">.</button>
                        <button type="button" class="btn-c eq" onclick="evalSci()" style="grid-column: span 2;">=</button>
                    </div>
                </div>
            </section>

            <section id="tab-ari" class="calc-section">
                <div class="form-group"><label>Incógnita a despejar:</label><select id="a-op"><option value="an">Último término (an)</option><option value="sn">Suma total (Sn)</option></select></div>
                <div class="fields-split">
                    <div class="form-group"><label>Primer término (a1):</label><input type="number" id="a-a1" step="any"></div>
                    <div class="form-group"><label>Diferencia (d):</label><input type="number" id="a-d" step="any"></div>
                </div>
                <div class="form-group"><label>Número de términos (n):</label><input type="number" id="a-n" step="any"></div>
                <button type="button" class="btn-action" onclick="solveArithmetic()">Calcular Progresión</button>
                <div id="ari-result" class="result-box"></div>
            </section>

            <section id="tab-geo" class="calc-section">
                <div class="form-group"><label>Incógnita a despejar:</label><select id="g-op"><option value="an">Último término (an)</option><option value="sn">Suma total (Sn)</option></select></div>
                <div class="fields-split">
                    <div class="form-group"><label>Primer término (a1):</label><input type="number" id="g-a1" step="any"></div>
                    <div class="form-group"><label>Razón común (r):</label><input type="number" id="g-r" step="any"></div>
                </div>
                <div class="form-group"><label>Número de términos (n):</label><input type="number" id="g-n" step="any"></div>
                <button type="button" class="btn-action" onclick="solveGeometric()">Calcular Progresión</button>
                <div id="geo-result" class="result-box"></div>
            </section>

            <section id="tab-quad" class="calc-section">
                <p style="text-align:center; margin-bottom:15px; font-weight:bold;">Estructura: ax² + bx + c = 0</p>
                <div class="fields-split">
                    <div class="form-group"><label>Coeficiente a:</label><input type="number" id="q-a" step="any"></div>
                    <div class="form-group"><label>Coeficiente b:</label><input type="number" id="q-b" step="any"></div>
                </div>
                <div class="form-group"><label>Coeficiente c:</label><input type="number" id="q-c" step="any"></div>
                <button type="button" class="btn-action" onclick="solveQuadratic()">Resolver Ecuación</button>
                <div id="quad-result" class="result-box"></div>
            </section>

            <section id="tab-pyt" class="calc-section">
                <div class="form-group"><label>Variable Desconocida:</label><select id="py-op" onchange="togglePythUI()"><option value="c">Hipotenusa (c)</option><option value="a">Cateto (a)</option></select></div>
                <div class="fields-split">
                    <div class="form-group" id="box-pya"><label>Cateto a:</label><input type="number" id="py-a" step="any"></div>
                    <div class="form-group" id="box-pyb"><label>Cateto b:</label><input type="number" id="py-b" step="any"></div>
                    <div class="form-group hidden" id="box-pyc"><label>Hipotenusa c:</label><input type="number" id="py-c" step="any"></div>
                </div>
                <button type="button" class="btn-action" onclick="solvePythagoras()">Calcular Lado</button>
                <div id="pyt-result" class="result-box"></div>
            </section>

        </div>
    </main>

    <script>
        /* SPA ROUTER COMPONENT */
        function switchTab(tabId, btn) {
            document.querySelectorAll('.calc-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        /* =========================================
           LÓGICA: CALCULADORA CIENTÍFICA PRO
           ========================================= */
        let sciBuffer = "0";
        let shiftActive = false;
        let trigMode = "DEG";

        function toggleShift() {
            shiftActive = !shiftActive;
            document.getElementById('btn-shift').classList.toggle('active', shiftActive);
            document.getElementById('shift-ind').style.display = shiftActive ? 'block' : 'none';
        }

        function setTrig(mode) {
            trigMode = mode;
            document.getElementById('mDeg').className = mode === 'DEG' ? 'active' : '';
            document.getElementById('mRad').className = mode === 'RAD' ? 'active' : '';
        }

        function appendSci(val) {
            const display = document.getElementById('hw-display');
            if (sciBuffer === "0" && val !== "." && !isNaN(val)) sciBuffer = "";
            if (sciBuffer === "0" && (val === "sin(" || val === "cos(" || val === "tan(" || val === "π" || val === "(")) sciBuffer = "";
            sciBuffer += val;
            display.innerText = sciBuffer;
        }

        function triggerTrig(baseFunc) {
            const finalFunc = shiftActive ? 'a' + baseFunc : baseFunc;
            appendSci(finalFunc + '(');
            if(shiftActive) toggleShift();
        }

        function clearSci() {
            sciBuffer = "0";
            document.getElementById('hw-display').innerText = sciBuffer;
            if(shiftActive) toggleShift();
        }

        function evalSci() {
            const display = document.getElementById('hw-display');
            try {
                let expr = sciBuffer;
                const rFactor = trigMode === 'DEG' ? '(Math.PI/180)' : '1';
                const invFactor = trigMode === 'DEG' ? '(180/Math.PI)*' : '';

                expr = expr.replace(/acos\(/g, `${invFactor}Math.acos(焦虑`)
                           .replace(/asin\(/g, `${invFactor}Math.asin(`)
                           .replace(/atan\(/g, `${invFactor}Math.atan(`)
                           .replace(/cos\(/g, `Math.cos(${rFactor}*`)
                           .replace(/sin\(/g, `Math.sin(${rFactor}*`)
                           .replace(/tan\(/g, `Math.tan(${rFactor}*`)
                           .replace(/acos\(焦虑/g, `Math.acos(`)
                           .replace(/log\(/g, 'Math.log10(')
                           .replace(/√\(/g, 'Math.sqrt(')
                           .replace(/\^/g, '**')
                           .replace(/π/g, 'Math.PI')
                           .replace(/e/g, 'Math.E');

                let result = new Function('return ' + expr)();
                if(isNaN(result) || !isFinite(result)) throw "Error";
                result = Math.round(result * 1000000) / 1000000;
                sciBuffer = result.toString();
                display.innerText = sciBuffer;
            } catch (err) {
                display.innerText = "Error Sintaxis";
                sciBuffer = "0";
            }
        }

        /* =========================================
           LÓGICA: PROGRESIONES ARITMÉTICAS
           ========================================= */
        function solveArithmetic() {
            const op = document.getElementById('a-op').value;
            const a1 = parseFloat(document.getElementById('a-a1').value);
            const d = parseFloat(document.getElementById('a-d').value);
            const n = parseFloat(document.getElementById('a-n').value);
            const resBox = document.getElementById('ari-result');

            if(isNaN(a1) || !Number.isInteger(n) || n <= 0 || isNaN(d)) {
                resBox.innerHTML = "<span style='color:#EF233C;'><strong>Error:</strong> Parámetros de la sucesión incorrectos.</span>";
                resBox.style.display = "block"; return;
            }
            let an = a1 + (n - 1) * d;
            resBox.innerHTML = op === 'an' ? `Término General aₙ (n=${n}): <strong>${an}</strong>` : `Suma Total de Términos Sₙ: <strong>${(n * (a1 + an)) / 2}</strong>`;
            resBox.style.display = "block";
        }

        /* =========================================
           LÓGICA: PROGRESIONES GEOMÉTRICAS
           ========================================= */
        function solveGeometric() {
            const op = document.getElementById('g-op').value;
            const a1 = parseFloat(document.getElementById('g-a1').value);
            const r = parseFloat(document.getElementById('g-r').value);
            const n = parseFloat(document.getElementById('g-n').value);
            const resBox = document.getElementById('geo-result');

            if(isNaN(a1) || !Number.isInteger(n) || n <= 0 || isNaN(r)) {
                resBox.innerHTML = "<span style='color:#EF233C;'><strong>Error:</strong> Parámetros incorrectos.</span>";
                resBox.style.display = "block"; return;
            }
            let an = a1 * Math.pow(r, n - 1);
            resBox.innerHTML = op === 'an' ? `Término General aₙ (n=${n}): <strong>${an}</strong>` : `Suma Total Sₙ: <strong>${r === 1 ? a1 * n : (a1 * (Math.pow(r, n) - 1)) / (r - 1)}</strong>`;
            resBox.style.display = "block";
        }

        /* =========================================
           LÓGICA: ECUACIONES DE 2DO GRADO
           ========================================= */
        function solveQuadratic() {
            const a = parseFloat(document.getElementById('q-a').value);
            const b = parseFloat(document.getElementById('q-b').value);
            const c = parseFloat(document.getElementById('q-c').value);
            const resBox = document.getElementById('quad-result');

            if(isNaN(a) || isNaN(b) || isNaN(c) || a === 0) {
                resBox.innerHTML = "<span style='color:#EF233C;'><strong>Error:</strong> El coeficiente 'a' no puede ser 0.</span>";
                resBox.style.display = "block"; return;
            }
            const disc = (b * b) - (4 * a * c);
            if(disc < 0) resText = "La ecuación no posee raíces reales (Discriminante < 0).";
            else resText = `x₁ = <strong>${(-b + Math.sqrt(disc)) / (2 * a)}</strong><br>x₂ = <strong>${(-b - Math.sqrt(disc)) / (2 * a)}</strong>`;
            resBox.innerHTML = resText; resBox.style.display = "block";
        }

        /* =========================================
           LÓGICA: TEOREMA DE PITÁGORAS
           ========================================= */
        function togglePythUI() {
            const op = document.getElementById('py-op').value;
            document.getElementById('box-pya').classList.toggle('hidden', op === 'a');
            document.getElementById('box-pyc').classList.toggle('hidden', op === 'c');
        }
        function solvePythagoras() {
            const op = document.getElementById('py-op').value;
            const resBox = document.getElementById('pyt-result');
            if(op === 'c') {
                const a = parseFloat(document.getElementById('py-a').value);
                const b = parseFloat(document.getElementById('py-b').value);
                if(isNaN(a) || isNaN(b) || a <= 0 || b <= 0) { resBox.innerHTML = "Lados inválidos."; resBox.style.display="block"; return; }
                resBox.innerHTML = `Hipotenusa (c) = <strong>${Math.sqrt(a*a + b*b).toFixed(4)}</strong>`;
            } else {
                const b = parseFloat(document.getElementById('py-b').value);
                const c = parseFloat(document.getElementById('py-c').value);
                if(isNaN(b) || isNaN(c) || b <= 0 || c <= 0 || b >= c) { resBox.innerHTML = "Hipotenusa debe ser mayor al cateto."; resBox.style.display="block"; return; }
                resBox.innerHTML = `Cateto (a) = <strong>${Math.sqrt(c*c - b*b).toFixed(4)}</strong>`;
            }
            resBox.style.display = "block";
        }
    </script>
</body>
</html>
