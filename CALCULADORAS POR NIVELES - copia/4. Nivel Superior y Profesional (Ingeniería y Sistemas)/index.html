<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConectRuben | Nivel Superior y Profesional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* =========================================
           DISEÑO INSTITUCIONAL EDUCONECTRUBEN
           ========================================= */
        :root {
            --clr-navy: #0A192F;
            --clr-blue: #00B4D8;
            --clr-hover: #0096C7;
            --clr-white: #FFFFFF;
            --clr-bg: #F4F7FB;
            --clr-border: #E0E5EC;
            --shadow: 0 10px 30px rgba(10, 25, 47, 0.08);
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--clr-bg); color: #333;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .app-container {
            background-color: var(--clr-white); width: 100%; max-width: 750px;
            border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden;
            border-top: 6px solid var(--clr-navy);
        }

        header {
            background-color: var(--clr-navy); color: var(--white);
            padding: 20px; text-align: center;
        }
        header h1 { color: var(--clr-blue); font-size: 1.6rem; font-family: 'Poppins', sans-serif; }
        header p { color: #FFFFFF; font-size: 0.88rem; opacity: 0.85; margin-top: 2px; }

        /* NAVBAR SPA */
        .tab-menu { display: flex; background-color: #FAFCFF; border-bottom: 2px solid var(--clr-border); overflow-x: auto; }
        .tab-btn {
            flex: 1; padding: 14px 10px; background: none; border: none;
            border-bottom: 3px solid transparent; font-size: 0.95rem; font-weight: 600;
            color: var(--clr-navy); cursor: pointer; transition: all 0.2s ease; white-space: nowrap;
        }
        .tab-btn:hover { background-color: #F0F4F8; color: var(--clr-blue); }
        .tab-btn.active { color: var(--clr-blue); border-bottom-color: var(--clr-blue); background-color: var(--clr-white); }

        /* CUERPO CENTRAL */
        .workspace-content { padding: 25px; }
        .calc-section { display: none; animation: fadeIn 0.3s ease-in-out; }
        .calc-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

        /* FORMULARIOS COMUNES */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--clr-navy); font-size: 0.88rem; }
        select, input { width: 100%; padding: 11px; border: 2px solid var(--clr-border); border-radius: 8px; font-size: 0.95rem; }
        select:focus, input:focus { outline: none; border-color: var(--clr-blue); }
        
        .fields-split { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-action { 
            width: 100%; padding: 13px; background-color: var(--clr-blue); 
            color: var(--clr-white); border: none; border-radius: 8px; 
            font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: 0.25s; 
            margin-top: 10px;
        }
        .btn-action:hover { background-color: var(--clr-hover); }
        
        .result-box { 
            margin-top: 20px; padding: 15px; background-color: #E8F4F8; 
            border-left: 5px solid var(--clr-blue); border-radius: 4px; 
            font-size: 1rem; color: var(--clr-navy); display: none; line-height: 1.5; 
        }

        /* CONSOLA DE PROGRAMADOR RESULTADOS */
        .prog-result-layout { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .prog-row { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--clr-white); padding: 10px 15px; border-radius: 6px; 
            border: 1px solid var(--clr-border); 
        }
        .prog-row span:first-child { font-weight: bold; color: var(--clr-navy); width: 110px; font-size: 0.85rem; }
        .prog-row span:last-child { font-family: monospace; font-size: 1.1rem; color: #EF233C; word-break: break-all; text-align: right; }

        /* CUADRÍCULA MATRIZ 3x3 SARRUS */
        .matrix-container { display: flex; justify-content: center; margin: 10px 0 20px 0; }
        .matrix-grid-3x3 { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            background: #F8FAFC; padding: 20px; border-radius: 8px; 
            border-left: 4px solid var(--clr-navy); border-right: 4px solid var(--clr-navy);
            max-width: 260px;
        }
        .matrix-grid-3x3 input { text-align: center; font-weight: bold; padding: 8px; width: 65px; }

        /* DISEÑO DE INTERFAZ DE LÓGICA */
        .logic-panel { background: #F8FAFC; padding: 20px; border-radius: 8px; border: 1px solid var(--clr-border); margin-bottom: 15px; text-align: center; }
        .logic-buttons-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .btn-logic-op { padding: 12px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 6px; background-color: var(--clr-navy); color: white; cursor: pointer; transition: 0.2s; }
        .btn-logic-op:hover { background-color: var(--clr-blue); }
    </style>
</head>
<body>

    <main class="app-container">
        <header>
            <h1>EduConectRuben</h1>
            <p>Módulo Nivel Superior: Sistemas, Matrices, Finanzas y Lógica Pro</p>
        </header>

        <nav class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('tab-prog', this)"><i class="fa-solid fa-binary"></i> Programador</button>
            <button class="tab-btn" onclick="switchTab('tab-logic', this)"><i class="fa-solid fa-brain"></i> Lógica Matemática</button>
            <button class="tab-btn" onclick="switchTab('tab-matrix', this)"><i class="fa-solid fa-table-cells"></i> Matriz 3x3</button>
            <button class="tab-btn" onclick="switchTab('tab-finance', this)"><i class="fa-solid fa-chart-line"></i> Financiera</button>
        </nav>

        <div class="workspace-content">
            
            <section id="tab-prog" class="calc-section active">
                <div class="form-group">
                    <label>Base Numérica de Entrada:</label>
                    <select id="pr-base">
                        <option value="10">Decimal (Base 10)</option>
                        <option value="2">Binario (Base 2)</option>
                        <option value="16">Hexadecimal (Base 16)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ingresa el Valor:</label>
                    <input type="text" id="pr-val" placeholder="Ej: 255 o 11111111 o FF" autocomplete="off">
                </div>
                <button type="button" class="btn-action" onclick="solveProgrammer()">Convertir Bases</button>
                
                <div id="prog-output-box" class="result-box" style="padding: 12px;">
                    <strong>Resultados de Conversión Simultánea:</strong>
                    <div class="prog-result-layout">
                        <div class="prog-row"><span>BINARIO:</span> <span id="res-bin">-</span></div>
                        <div class="prog-row"><span>DECIMAL:</span> <span id="res-dec">-</span></div>
                        <div class="prog-row"><span>HEXADECIMAL:</span> <span id="res-hex">-</span></div>
                    </div>
                </div>
            </section>

            <section id="tab-logic" class="calc-section">
                <p style="text-align:center; margin-bottom: 15px; font-size: 0.95rem; color:#555;">Evaluador de Proposiciones y Conectores Lógicos</p>
                
                <div class="logic-panel">
                    <div class="fields-split">
                        <div class="form-group">
                            <label>Variable P:</label>
                            <select id="log-p"><option value="V">V (Verdadero / 1)</option><option value="F">F (Falso / 0)</option></select>
                        </div>
                        <div class="form-group">
                            <label>Variable Q:</label>
                            <select id="log-q"><option value="V">V (Verdadero / 1)</option><option value="F">F (Falso / 0)</option></select>
                        </div>
                    </div>
                    
                    <label>Selecciona el Conector Lógico:</label>
                    <div class="logic-buttons-grid">
                        <button type="button" class="btn-logic-op" onclick="solveLogic('AND')" title="Conjunción (Y)">P ∧ Q</button>
                        <button type="button" class="btn-logic-op" onclick="solveLogic('OR')" title="Disyunción (O)">P ∨ Q</button>
                        <button type="button" class="btn-logic-op" onclick="solveLogic('COND')" title="Condicional (Implica)">P → Q</button>
                        <button type="button" class="btn-logic-op" onclick="solveLogic('BICOND')" title="Bicondicional (Equivalencia)">P ↔ Q</button>
                    </div>
                </div>
                <div id="logic-result" class="result-box"></div>
            </section>

            <section id="tab-matrix" class="calc-section">
                <p style="text-align:center; margin-bottom: 15px; font-size: 0.9rem; color:#555;">Cálculo del Determinante |A| mediante la Regla de Sarrus</p>
                <div class="matrix-container">
                    <div class="matrix-grid-3x3">
                        <input type="number" id="m00" placeholder="a₁₁" step="any">
                        <input type="number" id="m01" placeholder="a₁₂" step="any">
                        <input type="number" id="m02" placeholder="a₁₃" step="any">
                        
                        <input type="number" id="m10" placeholder="a₂₁" step="any">
                        <input type="number" id="m11" placeholder="a₂₂" step="any">
                        <input type="number" id="m12" placeholder="a₂₃" step="any">
                        
                        <input type="number" id="m20" placeholder="a₃₁" step="any">
                        <input type="number" id="m21" placeholder="a₃₂" step="any">
                        <input type="number" id="m22" placeholder="a₃₃" step="any">
                    </div>
                </div>
                <button type="button" class="btn-action" onclick="solveMatrix()">Calcular Determinante</button>
                <div id="matrix-result" class="result-box"></div>
            </section>

            <section id="tab-finance" class="calc-section">
                <div class="fields-split">
                    <div class="form-group"><label>Capital Inicial (P):</label><input type="number" id="f-p" step="any"></div>
                    <div class="form-group"><label>Tasa % Anual (r):</label><input type="number" id="f-r" step="any"></div>
                </div>
                <div class="fields-split">
                    <div class="form-group"><label>Tiempo (Años t):</label><input type="number" id="f-t" step="any"></div>
                    <div class="form-group">
                        <label>Frecuencia de Capitalización (n):</label>
                        <select id="f-n">
                            <option value="1">Anual (1 vez al año)</option>
                            <option value="12">Mensual (12 veces al año)</option>
                        </select>
                    </div>
                </div>
                <button type="button" class="btn-action" onclick="solveFinance()">Proyectar Capital</button>
                <div id="finance-result" class="result-box"></div>
            </section>

        </div>
    </main>

    <script>
        /* ROUTER SPA */
        function switchTab(tabId, btn) {
            document.querySelectorAll('.calc-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        /* =========================================
           LÓGICA: CALCULADORA DE PROGRAMADOR
           ========================================= */
        function solveProgrammer() {
            const base = parseInt(document.getElementById('pr-base').value);
            const rawVal = document.getElementById('pr-val').value.trim();
            const outPanel = document.getElementById('prog-output-box');

            if(rawVal === "") { alert("Por favor introduce un valor numérico."); return; }

            const validators = {
                2: /^[01]+$/,
                10: /^-?\d+$/,
                16: /^[0-9A-Fa-f]+$/
            };

            if (!validators[base].test(rawVal)) {
                alert(`Error: El formato ingresado no corresponde a la Base ${base}.`);
                outPanel.style.display = "none"; return;
            }

            const decValue = parseInt(rawVal, base);
            if (isNaN(decValue)) { alert("Error en el parseo numérico."); return; }

            document.getElementById('res-bin').innerText = decValue.toString(2);
            document.getElementById('res-dec').innerText = decValue.toString(10);
            document.getElementById('res-hex').innerText = decValue.toString(16).toUpperCase();
            outPanel.style.display = "block";
        }

        /* =========================================
           LÓGICA: CONECTORES LÓGICOS MATEMÁTICOS
           ========================================= */
        function solveLogic(op) {
            const p = document.getElementById('log-p').value === 'V';
            const q = document.getElementById('log-q').value === 'V';
            const resBox = document.getElementById('logic-result');
            
            let finalValue = false;
            let opSymbol = "";
            let ruleText = "";

            if (op === 'AND') {
                finalValue = p && q; opSymbol = "∧ (Conjunción)";
                ruleText = "La regla dicta que la Conjunción es Verdadera <strong>únicamente</strong> cuando ambas variables son Verdaderas.";
            } else if (op === 'OR') {
                finalValue = p || q; opSymbol = "∨ (Disyunción)";
                ruleText = "La regla dicta que la Disyunción es Falsa <strong>únicamente</strong> cuando ambas variables son Falsas.";
            } else if (op === 'COND') {
                finalValue = !p || q; opSymbol = "→ (Condicional)";
                ruleText = "La regla dicta que la Implicación es Falsa <strong>únicamente</strong> cuando el antecedente es Verdadero y el consecuente es Falso (V → F).";
            } else if (op === 'BICOND') {
                finalValue = p === q; opSymbol = "↔ (Bicondicional)";
                ruleText = "La regla dicta que la Equivalencia es Verdadera <strong>únicamente</strong> cuando ambas variables poseen el mismo valor lógico (V ↔ V o F ↔ F).";
            }

            const resStr = finalValue ? "<span style='color:#2A9D8F; font-weight:bold;'>VERDADERO (1)</span>" : "<span style='color:#EF233C; font-weight:bold;'>FALSO (0)</span>";
            
            resBox.innerHTML = `
                <strong>Evaluación de Operación de Lógica Proposicional:</strong><br><br>
                Expresión Evaluada: <strong>P ${opSymbol} Q</strong><br>
                Resultado Final: ${resStr}<br><br>
                <span style="font-size:0.9rem; color:#555;"><strong>Análisis Teórico:</strong> ${ruleText}</span>
            `;
            resBox.style.display = "block";
        }

        /* =========================================
           LÓGICA: MATRICES POR REGLA DE SARRUS
           ========================================= */
        function solveMatrix() {
            const resBox = document.getElementById('matrix-result');
            const m = [
                [parseFloat(document.getElementById('m00').value), parseFloat(document.getElementById('m01').value), parseFloat(document.getElementById('m02').value)],
                [parseFloat(document.getElementById('m10').value), parseFloat(document.getElementById('m11').value), parseFloat(document.getElementById('m12').value)],
                [parseFloat(document.getElementById('m20').value), parseFloat(document.getElementById('m21').value), parseFloat(document.getElementById('m22').value)]
            ];

            for(let i=0; i<3; i++) {
                for(let j=0; j<3; j++) {
                    if(isNaN(m[i][j])) {
                        resBox.innerHTML = "<span style='color:#EF233C;'><strong>Error:</strong> Llene las 9 posiciones de la matriz 3x3.</span>";
                        resBox.style.display = "block"; return;
                    }
                }
            }

            const diagPos = (m[0][0]*m[1][1]*m[2][2]) + (m[0][1]*m[1][2]*m[2][0]) + (m[0][2]*m[1][0]*m[2][1]);
            const diagNeg = (m[0][2]*m[1][1]*m[2][0]) + (m[0][0]*m[1][2]*m[2][1]) + (m[0][1]*m[1][0]*m[2][2]);
            const det = diagPos - diagNeg;

            resBox.innerHTML = `
                <strong>Resolución por Método de Sarrus:</strong><br><br>
                Diagonales Principales (+) = ${Math.round(diagPos * 1000) / 1000}<br>
                Diagonales Secundarias (-) = ${Math.round(diagNeg * 1000) / 1000}<br><br>
                <span style="font-size:1.1rem; color:var(--clr-navy);"><strong>Determinante |A| = ${Math.round(det * 1000) / 1000}</strong></span>
            `;
            resBox.style.display = "block";
        }

        /* =========================================
           LÓGICA: FINANCIERA (INTERÉS COMPUESTO)
           ========================================= */
        function solveFinance() {
            const P = parseFloat(document.getElementById('f-p').value);
            const rPercent = parseFloat(document.getElementById('f-r').value);
            const t = parseFloat(document.getElementById('f-t').value);
            const n = parseInt(document.getElementById('f-n').value);
            const resBox = document.getElementById('finance-result');

            if(isNaN(P) || isNaN(rPercent) || isNaN(t) || P <= 0 || rPercent < 0 || t <= 0) {
                resBox.innerHTML = "<span style='color:#EF233C;'><strong>Error:</strong> Verifique los parámetros financieros.</span>";
                resBox.style.display = "block"; return;
            }

            const r = rPercent / 100;
            const A = P * Math.pow((1 + r / n), (n * t));
            const totalInterest = A - P;

            resBox.innerHTML = `
                <strong>Proyección de Rentabilidad del Proyecto:</strong><br><br>
                Capital Inicial Invertido (P): <strong>$${P.toLocaleString()}</strong><br>
                Interés Líquido Acumulado (I): <strong>$${totalInterest.toFixed(2).toLocaleString()}</strong><br><br>
                <span style="font-size:1.1rem; color:#2A9D8F;"><strong>Monto Total Proyectado (A): $${A.toFixed(2).toLocaleString()}</strong></span>
            `;
            resBox.style.display = "block";
        }
    </script>
</body>
</html>
